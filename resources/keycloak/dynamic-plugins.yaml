- package: 'oci://ghcr.io/redhat-developer/rhdh-plugin-export-overlays/backstage-community-plugin-catalog-backend-module-keycloak:bs_1.45.3__3.16.0'
  disabled: false
  pluginConfig:
    catalog:
      providers:
        keycloakOrg:
          default:
            baseUrl: '${KEYCLOAK_BASE_URL}'
            loginRealm: '${KEYCLOAK_LOGIN_REALM}'
            realm: '${KEYCLOAK_REALM}'
            clientId: '${KEYCLOAK_CLIENT_ID}'
            clientSecret: '${KEYCLOAK_CLIENT_SECRET}'
            schedule:
              frequency: { minutes: 20 }
              initialDelay: { seconds: 15 }
              timeout: { minutes: 5 }
    auth:
      environment: production
      providers:
        oidc:
          production:
            metadataUrl: '${KEYCLOAK_METADATA_URL}'
            clientId: '${KEYCLOAK_CLIENT_ID}'
            clientSecret: '${KEYCLOAK_CLIENT_SECRET}'
            prompt: auto
            callbackUrl: '${RHDH_BASE_URL}/api/auth/oidc/handler/frame'
            signIn:
              resolvers:
                - resolver: emailLocalPartMatchingUserEntityName
        guest:
          dangerouslyAllowOutsideDevelopment: false
    signInPage: oidc
