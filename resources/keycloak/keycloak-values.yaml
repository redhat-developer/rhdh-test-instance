global:
  security:
    allowInsecureImages: true

replicaCount: 1

# Use Bitnami legacy repository (Bitnami images moved to bitnamilegacy as of Aug 2025)
# Note: Legacy images are not updated/maintained. Consider migrating to official Keycloak image for long-term.
# Images are pre-pulled into the cluster's internal registry via resources/image-stream-imports/
# to avoid Docker Hub rate limits. The ${NAMESPACE} placeholder is substituted by the deploy script.
image:
  registry: image-registry.openshift-image-registry.svc:5000
  repository: ${NAMESPACE}/internal-keycloak-legacy
  tag: latest
  pullPolicy: IfNotPresent

auth:
  adminUser: admin
  existingSecret: keycloak-credentials
  passwordSecretKey: admin-password

service:
  type: ClusterIP
  port: 8080

# OpenShift Route configuration
route:
  enabled: true
  host: '' # Will be auto-generated by OpenShift
  tls:
    enabled: false

ingress:
  enabled: false

postgresql:
  enabled: true
  image:
    registry: image-registry.openshift-image-registry.svc:5000
    repository: ${NAMESPACE}/internal-postgresql-legacy
    tag: latest
    pullPolicy: IfNotPresent
  auth:
    existingSecret: keycloak-credentials
    secretKeys:
      userPasswordKey: password
    username: keycloak
    database: keycloak
  primary:
    resources:
      limits:
        cpu: 1000m
        memory: 1Gi
      requests:
        cpu: 100m
        memory: 256Mi
    persistence:
      enabled: true
      size: 1Gi

resources:
  limits:
    cpu: 1000m
    memory: 1Gi
  requests:
    cpu: 100m
    memory: 256Mi

extraEnvVars:
  - name: KEYCLOAK_ADMIN
    value: admin
  - name: KC_HOSTNAME_STRICT
    value: 'false'
  - name: KC_HOSTNAME_STRICT_HTTPS
    value: 'false'
  - name: KC_HTTP_ENABLED
    value: 'true'
  - name: KC_PROXY
    value: 'edge'
  - name: JAVA_OPTS_APPEND
    value: '-Djava.net.preferIPv4Stack=true -Xms256m -Xmx512m'

# KEYCLOAK_ADMIN_PASSWORD is sourced from keycloak-credentials secret at runtime.
extraEnvVarsSecret: keycloak-credentials

# Increase probe timeouts for slower startup on resource-constrained clusters
livenessProbe:
  enabled: true
  initialDelaySeconds: 120
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

readinessProbe:
  enabled: true
  initialDelaySeconds: 60
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 6
  successThreshold: 1

# Remove the custom command to use Bitnami defaults
# command:
#   - /opt/keycloak/bin/kc.sh
#   - start-dev

# Configuration is now handled by our REST API job in the deployment script
# No keycloakConfigCli needed
