apiVersion: image.openshift.io/v1
kind: ImageStreamImport
metadata:
  name: internal-postgresql-legacy
spec:
  import: true
  images:
    - from:
        kind: DockerImage
        name: bitnamilegacy/postgresql:17.6.0-debian-12-r4
      to:
        name: latest
      importPolicy:
        insecure: false # Set to true if using an insecure registry
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: internal-postgresql-legacy
spec:
  lookupPolicy:
    local: true # Ensure the image is resolved locally
