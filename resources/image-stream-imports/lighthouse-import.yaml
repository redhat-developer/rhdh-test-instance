apiVersion: image.openshift.io/v1
kind: ImageStreamImport
metadata:
  name: internal-lighthouse-audit-service
spec:
  import: true
  images:
    - from:
        kind: DockerImage
        name: docker.io/spotify/lighthouse-audit-service:latest
      to:
        name: latest
      importPolicy:
        insecure: false
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: internal-lighthouse-audit-service
spec:
  lookupPolicy:
    local: true
---
# PostgreSQL 13 — used as the lighthouse-audit-service backing store.
# bitnami/postgresql is hosted on Docker Hub, so we pre-import it to avoid
# hitting registry rate limits.
apiVersion: image.openshift.io/v1
kind: ImageStreamImport
metadata:
  name: internal-postgres
spec:
  import: true
  images:
    - from:
        kind: DockerImage
        name: docker.io/postgres:13
      to:
        name: "13"
      importPolicy:
        insecure: false
---
apiVersion: image.openshift.io/v1
kind: ImageStream
metadata:
  name: internal-postgres
spec:
  lookupPolicy:
    local: true
