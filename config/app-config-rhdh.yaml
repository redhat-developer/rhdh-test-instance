#       apps:
#         - appId: ${GITHUB_APP_ID}
#           clientId: ${GITHUB_CLIENT_ID}
#           clientSecret: ${GITHUB_CLIENT_SECRET}
#           privateKey: |
#             ${GITHUB_PRIVATE_KEY}

# Scorecard GitHub metrics thresholds
scorecard:
  plugins:
    github:
      open_prs:
        thresholds:
          rules:
            - key: success
              expression: '<10'
            - key: warning
              expression: '10-50'
            - key: error
              expression: '>50'