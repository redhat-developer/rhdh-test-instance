apiVersion: rhdh.redhat.com/v1alpha3
kind: Backstage
metadata:
  name: developer-hub
spec:
  application:
    appConfig:
      configMaps:
        - name: app-config-rhdh
${GUEST_AUTH_CONFIG_MAP_ENTRY}
      mountPath: /opt/app-root/src
    extraFiles:
      mountPath: /opt/app-root/src
      configMaps:
        - name: rbac-policy
          mountPath: /opt/app-root/src/rbac
        - name: users-config-map
          mountPath: /opt/app-root/src/catalog-entities
        - name: operators-config-map
          mountPath: /opt/app-root/src/catalog-entities
        - name: plugins-config-map
          mountPath: /opt/app-root/src/catalog-entities
        - name: components-config-map
          mountPath: /opt/app-root/src/catalog-entities
        - name: resources-config-map
          mountPath: /opt/app-root/src/catalog-entities
    replicas: 1
    route:
      enabled: true
    dynamicPluginsConfigMapName: dynamic-plugins
    extraEnvs:
      envs:
        - name: RHDH_BASE_URL
          value: '${RHDH_BASE_URL}'
        - name: CATALOG_INDEX_IMAGE
          value: 'quay.io/rhdh/plugin-catalog-index:${CATALOG_INDEX_TAG}'
        - name: NODE_TLS_REJECT_UNAUTHORIZED
          value: '0'
        - name: SEGMENT_TEST_MODE
          value: 'true'
      secrets:
        - name: rhdh-secrets
  database:
    enableLocalDb: true
